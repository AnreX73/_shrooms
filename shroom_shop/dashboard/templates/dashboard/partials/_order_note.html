<div id="note-{{ order.id }}">
  {% if order.assigned_manager_note %}
    <div class="small text-muted mt-2 fst-italic">
      {{ order.assigned_manager_note }}
    </div>
    <button class="btn btn-outline-secondary btn-sm mt-1 order_action_btn"
            hx-get="{% url 'dashboard:order_note_form' order.id %}"
            hx-target="#note-{{ order.id }}"
            hx-swap="outerHTML">
      ✏️ Изменить
    </button>
  {% else %}
    <button class="btn btn-outline-secondary btn-sm mt-1 order_action_btn"
            hx-get="{% url 'dashboard:order_note_form' order.id %}"
            hx-target="#note-{{ order.id }}"
            hx-swap="outerHTML">
      ➕ Добавить примечание
    </button>
  {% endif %}
</div>
