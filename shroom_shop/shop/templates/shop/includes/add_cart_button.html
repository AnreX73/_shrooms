
<button class="add-to-cart-btn"
        {% if product.stock == 0 %}disabled{% endif %}
         x-data="{ 
        isAuth: {{ user.is_authenticated|yesno:'true,false' }},
        handleCart() {
            if (!this.isAuth) return alert('Нужно авторизоваться!');
            
            htmx.ajax('POST', '{% url 'shop:toggle_cart' product.id %}', {
                values: { is_cart: true },
                swap: 'none'
            });
        }
    }"
    @click.prevent="handleCart">
            <svg fill="#8a5944" viewBox="0 0 24 24">
                <path d="M19 6h-2c0-2.76-2.24-5-5-5S7 3.24 7 6H5c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-7-3c1.66 0 3 1.34 3 3H9c0-1.66 1.34-3 3-3zm0 10c-2.76 0-5-2.24-5-5h2c0 1.66 1.34 3 3 3s3-1.34 3-3h2c0 2.76-2.24 5-5 5z"/>
            </svg>
            <p>В корзину</p>
            
            
        </button>
