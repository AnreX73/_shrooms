{% extends 'shop/base.html' %}

{% block content %}
<div class="auth_all_form_content">
    <h2>Для сброса пароля  введите email</h2>
    <form class="auth_form" action="" method="post">
        {% csrf_token %}
<input type="hidden" name="next" value="{{ next }}">
    <div class="form_error">{{ form.non_field_errors }}</div>
    <div class="form_container">
    {% for field in form %}
    <div class="group">
        {{ field }}
          
        <span class="highlight"></span>
      <span class="bar"></span>
      <label  for="{{ field.id_for_label }}">{{ field.label }}:</label>
        <div class="form_error">{{ field.errors }}</div>
    </div>
    {% endfor %}
    </div>
        <input class="users-btn forgot_password" type="submit" value="Сброс пароля">
    </form>
</div>
{% endblock content %}
